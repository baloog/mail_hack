<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meetings - Mail Hack</title>
  <link rel="stylesheet" href="meetings.css" />
</head>
<body>
  <div class="meetings-page">
    <header class="meetings-header">
      <div>
        <h1>Meetings</h1>
        <p>Create meetings from natural language using AI</p>
      </div>
      <a href="index.html" class="back-link">← Back to Mail</a>
    </header>

    <main class="meetings-main">
      <section class="meetings-card">
        <h2>Create Meeting</h2>

        <div class="form-group">
          <label for="meetingUserEmail">Your Email</label>
          <input
            type="email"
            id="meetingUserEmail"
            placeholder="you@example.com"
          />
        </div>

        <div class="form-group">
          <label for="meetingRequest">Meeting Request</label>
          <textarea
            id="meetingRequest"
            rows="6"
            placeholder="Example: Set up a meeting with David tomorrow at 2 PM about the landing page review"
          ></textarea>
        </div>

        <div class="actions">
          <button id="voiceMeetingBtn" class="btn-secondary" type="button">🎤 Voice Input</button>
          <button id="stopVoiceMeetingBtn" class="btn-secondary" type="button" style="display: none;">⏹️ Stop</button>
          <button id="createMeetingBtn" class="btn-primary">Create Meeting</button>
          <button id="clearMeetingBtn" class="btn-secondary" type="button">Clear</button>
        </div>

        <div id="meetingListeningStatus" class="meeting-listening-status" style="display: none;">
          <div class="meeting-listening-dot"></div>
          <span id="meetingListeningText">Listening for your meeting details...</span>
        </div>
      </section>

      <section id="meetingResultCard" class="meetings-card" style="display: none;">
        <h2>Parsed Meeting Details</h2>

        <div class="meeting-result-grid">
          <div class="result-item">
            <span class="result-label">Title</span>
            <span id="meetingResultTitle" class="result-value">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">Date</span>
            <span id="meetingResultDate" class="result-value">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">Time</span>
            <span id="meetingResultTime" class="result-value">-</span>
          </div>

          <div class="result-item">
            <span class="result-label">Attendees</span>
            <span id="meetingResultAttendees" class="result-value">-</span>
          </div>

          <div class="result-item full-width">
            <span class="result-label">Purpose</span>
            <span id="meetingResultPurpose" class="result-value">-</span>
          </div>
        </div>
      </section>

      <section class="meetings-card">
        <h2>Saved Meetings</h2>
        <div id="meetingsList" class="meetings-list"></div>
        <p id="meetingsEmpty" class="empty-text">No meetings created yet</p>
      </section>

      <section class="meetings-card">
        <h2>Status</h2>
        <p id="meetingStatusText" class="status-text">Ready to create a meeting.</p>
      </section>
    </main>
  </div>

  <script src="meetings.js"></script>
</body>
</html>
